aid: refersion
name: Refersion
description: Affiliate marketing platform for e-commerce brands providing a REST and
  GraphQL API for managing affiliates, tracking referrals, processing commissions,
  and integrating with Shopify, BigCommerce, WooCommerce, and other platforms.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/refersion/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
- Affiliate Marketing
- Influencer Marketing
- E-Commerce
- Referral Tracking
- Commission Management
- Shopify
apis:
- aid: refersion:refersion-rest-api
  name: Refersion REST API
  description: RESTful API for managing affiliates, tracking conversions, processing
    commissions, configuring SKU-level commission rates, and generating performance
    reports.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.refersion.dev/reference/welcome-to-refersion
  baseURL: https://api.refersion.com
  tags:
  - Affiliates
  - Conversions
  - Commissions
  - Referral Tracking
  properties:
  - type: Documentation
    url: https://www.refersion.dev/reference/welcome-to-refersion
  - type: OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/refersion/refs/heads/main/openapi/refersion-rest-api-openapi.yml
- aid: refersion:refersion-graphql-api
  name: Refersion GraphQL API
  description: GraphQL API providing an explorer interface for querying affiliate
    data, managing program configurations, and integrating with e-commerce platforms.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.refersion.dev/reference/graphql-overview
  baseURL: https://api.refersion.com/graphql
  tags:
  - GraphQL
  - Affiliates
  - E-Commerce
  properties:
  - type: Documentation
    url: https://www.refersion.dev/reference/graphql-overview
  - url: graphql/refersion-graphql.md
    type: GraphQL
- aid: refersion:refersion-webhooks-api
  name: Refersion Webhooks API
  description: Webhook API for receiving real-time notifications about affiliate activity,
    including new conversions, conversion approvals/denials, payments, affiliate status
    changes, and bonus tier movements.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.refersion.dev/reference/webhooks-for-merchants
  baseURL: https://api.refersion.com
  tags:
  - Webhooks
  - Conversions
  - Affiliates
  - Events
  properties:
  - type: Documentation
    url: https://www.refersion.dev/reference/webhooks-for-merchants
